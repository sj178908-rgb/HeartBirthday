<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories with Sia ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #fdf0f0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 3rem;
            margin-top: 50px;
        }

        /* Floating Animation */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 50px;
            gap: 30px;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 5px;
            transform: rotate(-5deg);
            transition: 0.3s;
            cursor: pointer;
            width: 250px;
            animation: float 4s ease-in-out infinite;
        }

        .polaroid:nth-child(even) {
            transform: rotate(5deg);
            animation-delay: 1s;
        }

        .polaroid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .caption {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #333;
            margin-top: 15px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 10;
        }

        #footer-msg {
            margin: 100px 0;
            font-size: 1.2rem;
            color: #ad1457;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>For My Special One ❤️</h1>
    <p>Sia♥️, every photo tells a story of us.</p>

    <div class="gallery">
        <div class="polaroid">
            <img src="img/photo1.jpg" alt="Memory 1">
            <div class="caption">The First Smile ✨</div>
        </div>

        <div class="polaroid">
            <img src="img/photo2.jpg" alt="Memory 2">
            <div class="caption">Best Day Ever 🌸</div>
        </div>

        <div class="polaroid">
            <img src="img/photo3.jpg" alt="Memory 3">
            <div class="caption">Together Forever 🥰</div>
        </div>

        <div class="polaroid">
            <img src="img/photo4.jpg" alt="Memory 4">
            <div class="caption">Pure Happiness ❤️</div>
        </div>
    </div>

    <div id="footer-msg">
        Sumit & Sia- Together since 2024
    </div>

</body>
</html>
